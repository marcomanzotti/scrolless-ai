<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrolless — AI chat demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #1a1a1d url("assets/hero-background.png") center center / cover no-repeat fixed;
      min-height: 100vh;
      color: #fff;
    }
    /* Real screenshot from scrolless.com already contains the nav bar and
       hero content, so this page is just the background + the live widget. */
    .badge {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.45); backdrop-filter: blur(6px);
      color: #fff; font-size: 12px; letter-spacing: .02em;
      padding: 7px 14px; border-radius: 20px; opacity: .85;
    }
  </style>
</head>
<body>
  <div class="badge">Demo page — real scrolless.com screenshot as background. Try the chat bubble, bottom-right ↘</div>

  <!-- Widget: one line. data-api uses a relative path so it works locally and in production. -->
  <script src="scrolless-widget.js" data-api="/api/chat"></script>
</body>
</html>
