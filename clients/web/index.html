<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrolless — Demo widget AI</title>
  <style>
    :root { --cream:#F4F1EA; --brown:#5A4632; --tan:#C8A57E; --text:#3A2E22; }
    * { box-sizing: border-box; margin: 0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      background:var(--cream); color:var(--text); line-height:1.6; }
    header { padding:24px 32px; display:flex; align-items:center; gap:10px; }
    header strong { font-size:20px; color:var(--brown); }
    .hero { max-width:680px; margin:8vh auto; text-align:center; padding:0 24px; }
    .hero h1 { font-size:clamp(32px,5vw,52px); color:var(--brown); line-height:1.15; margin-bottom:18px; }
    .hero p { font-size:18px; opacity:.8; margin-bottom:28px; }
    .cta { display:inline-block; background:var(--brown); color:var(--cream); padding:14px 28px;
      border-radius:30px; text-decoration:none; font-weight:600; }
    .note { margin-top:40px; font-size:14px; opacity:.6; }
  </style>
</head>
<body>
  <header><span style="width:14px;height:14px;border-radius:50%;background:var(--tan);display:inline-block"></span>
    <strong>Scrolless</strong></header>

  <section class="hero">
    <h1>La tua vita digitale, in equilibrio. La vista, protetta.</h1>
    <p>Scrolless monitora l'uso dello schermo e ti guida a pause di riposo per gli occhi basate sulla scienza.</p>
    <a class="cta" href="#">Scarica per iPhone</a>
    <p class="note">Pagina demo — il widget "Scrolless AI" è in basso a destra ↘</p>
  </section>

  <!-- Widget: one line. data-api uses a relative path so it works locally and in production. -->
  <script src="scrolless-widget.js" data-api="/api/chat"></script>
</body>
</html>
